services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - forgeloop_mongo_data:/data/db

  # Task 79: optional local cache / ephemeral state. Valkey speaks the
  # Redis protocol; set CACHE_PROVIDER=valkey + CACHE_REDIS_URL to use.
  # Not required — the default in-memory cache needs no service.
  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - forgeloop_valkey_data:/data

  # Task 82: optional local metrics scrape. Off by default — only
  # starts with `docker compose --profile observability up`. Scrapes
  # the locally-running API /metrics (auth required; see prometheus.yml).
  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  forgeloop_mongo_data:
  forgeloop_valkey_data:
